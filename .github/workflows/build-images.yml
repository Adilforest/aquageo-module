name: Build & Push Images

# Сборка backend/frontend образов и пуш в приватный GitHub Container Registry.
# CD выполняет Argo CD (этот workflow только публикует образы и линтит чарт).

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
    # Бамп тега из cd-bump меняет только deploy/** — не перезапускаем сборку.
    paths-ignore:
      - "deploy/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: aquageo-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: aquageo-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  helm-lint:
    name: Helm lint & template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Lint
        run: helm lint deploy/helm/aquageo
      - name: Template (default values)
        run: helm template aquageo deploy/helm/aquageo > /dev/null
      - name: Template (prod values)
        run: |
          helm template aquageo deploy/helm/aquageo \
            -f deploy/helm/aquageo/values-prod.yaml \
            --set externalDatabase.url=postgis://u:p@h:5432/db > /dev/null
      - name: Template (demo values)
        run: |
          helm template aquageo deploy/helm/aquageo \
            -f deploy/helm/aquageo/values-demo.yaml > /dev/null

  cd-bump:
    name: CD — publish demo branch
    needs: build
    # Только при push в main. main защищён, поэтому НЕ пишем в него:
    # публикуем отдельную незащищённую ветку demo (зеркало main + свежий тег),
    # за которой следит Argo CD. Ветка demo force-push'ится — это деплой-артефакт.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish demo branch with bumped image tag
        run: |
          TAG="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B demo '${{ github.sha }}'
          yq -i ".image.backend.tag = \"$TAG\"" deploy/helm/aquageo/values-demo.yaml
          yq -i ".image.frontend.tag = \"$TAG\"" deploy/helm/aquageo/values-demo.yaml
          git commit -am "chore(cd): demo images $TAG"
          git push -f origin demo

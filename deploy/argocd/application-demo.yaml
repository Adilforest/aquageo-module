# ДЕМО Argo CD Application — для презентации, НЕ для прода.
# Следит за веткой demo (её публикует CI: зеркало main + свежий тег образа).
# automated sync = на каждый push в main CI пересобирает образы и обновляет
# ветку demo -> Argo CD автоматически передеплоивает свежую сборку.
# Ветку main CI не трогает (она под branch protection).
#
# Один раз перед первым синком создать pull-секрет в namespace:
#   kubectl create namespace aquageo-demo
#   kubectl -n aquageo-demo create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=Adilforest \
#     --docker-password=<PAT read:packages>
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aquageo-demo
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Adilforest/aquageo-module.git
    targetRevision: demo
    path: deploy/helm/aquageo
    helm:
      valueFiles:
        - values-demo.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: aquageo-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

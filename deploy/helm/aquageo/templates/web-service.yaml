apiVersion: v1
kind: Service
metadata:
  name: {{ include "aquageo.fullname" . }}-web
  labels:
    {{- include "aquageo.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aquageo.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}

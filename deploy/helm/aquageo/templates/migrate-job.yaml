{{- if .Values.migrate.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "aquageo.fullname" . }}-migrate
  labels:
    {{- include "aquageo.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Хук фазы Sync (НЕ PreSync): иначе при встроенной БД миграции стартуют до
    # создания StatefulSet БД и висят, блокируя весь синк. sync-wave "0" ставит
    # их после БД/Redis (wave -5) и до приложений (wave 5).
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "aquageo.selectorLabels" (dict "ctx" . "component" "migrate") | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "aquageo.serviceAccountName" . }}
      {{- include "aquageo.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.security.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "aquageo.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.security.containerSecurityContext | nindent 12 }}
          command: ["sh", "-c"]
          args:
            - >-
              until python -c "import os,sys,urllib.parse as u,socket;
              d=u.urlparse(os.environ['DATABASE_URL']);
              s=socket.create_connection((d.hostname,d.port or 5432),3);s.close()" 2>/dev/null;
              do echo 'waiting for db...'; sleep 2; done &&
              python manage.py migrate --noinput
          {{- include "aquageo.appEnvFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.migrate.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
{{- end }}

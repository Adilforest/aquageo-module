{{- if .Values.imagePullSecret.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  labels:
    {{- include "aquageo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.imagePullSecret.registry .Values.imagePullSecret.username .Values.imagePullSecret.token (printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.token | b64enc) | b64enc }}
{{- end }}

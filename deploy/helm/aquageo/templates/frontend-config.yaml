{{- if .Values.frontend.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aquageo.fullname" . }}-frontend
  labels:
    {{- include "aquageo.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
data:
  default.conf: |
    server {
      listen {{ .Values.frontend.containerPort }};
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      # API и админка Django проксируются на web-сервис.
      location ~ ^/(api|admin|static|media)/ {
        proxy_pass http://{{ include "aquageo.fullname" . }}-web:{{ .Values.web.service.port }};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      # SPA: всё остальное отдаём index.html.
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
{{- end }}

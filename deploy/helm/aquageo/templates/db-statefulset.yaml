{{- if .Values.postgres.enabled -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aquageo.fullname" . }}-db
  labels:
    {{- include "aquageo.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  serviceName: {{ include "aquageo.fullname" . }}-db
  replicas: 1
  selector:
    matchLabels:
      {{- include "aquageo.selectorLabels" (dict "ctx" . "component" "db") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aquageo.selectorLabels" (dict "ctx" . "component" "db") | nindent 8 }}
    spec:
      # Образ postgis запускается под root и сам делает chown/chmod данных и
      # /var/run/postgresql, поэтому ему нужны дефолтные capabilities (CHOWN,
      # FOWNER, SETUID/SETGID). Строгий контекст (drop ALL) ломает entrypoint
      # с "Operation not permitted", поэтому БД оставляем с дефолтными правами.
      # ВНИМАНИЕ: послабление только для встроенной демо-БД; app-поды строгие.
      # Для прода используйте внешний managed Postgres (postgres.enabled=false).
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - { name: POSTGRES_DB,       value: {{ .Values.postgres.database | quote }} }
            - { name: POSTGRES_USER,     value: {{ .Values.postgres.username | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.postgres.password | quote }} }
            - { name: PGDATA,            value: /var/lib/postgresql/data/pgdata }
          ports:
            - { name: postgres, containerPort: 5432 }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.username | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- else }}
      volumes:
        - { name: data, emptyDir: {} }
  {{- end }}
{{- end }}
